<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Test Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header>
            <h1>GREEN-API Integration Test</h1>
        </header>

        <div class="main-layout">
            <!-- LEFT COLUMN: All Inputs & Buttons -->
            <section class="left-panel">
                <!-- Connection Parameters -->
                <input type="text" id="idInstance" placeholder="idInstance">
                <input type="text" id="apiTokenInstance" placeholder="ApiTokenInstance">

                <!-- getSettings Button -->
                <button id="btn-getSettings" class="btn-primary">getSettings</button>

                <!-- getStateInstance Button -->
                <button id="btn-getStateInstance" class="btn-primary">getStateInstance</button>

                <!-- sendMessage Section -->
                <input type="text" id="send-chatId" placeholder="77771234567">
                <textarea id="send-message" placeholder="Hello World!"></textarea>
                <button id="btn-sendMessage" class="btn-primary">sendMessage</button>

                <!-- sendFileByUrl Section -->
                <input type="text" id="file-chatId" placeholder="77771234567">
                <input type="text" id="file-url" placeholder="https://my.site.com/img/horse.png">
                <button id="btn-sendFileByUrl" class="btn-primary">sendFileByUrl</button>
            </section>

            <!-- RIGHT COLUMN: Single Large Response Area -->
            <section class="right-panel">
                <label>Ответ:</label>
                <textarea id="response-output" readonly placeholder="Response will appear here..."></textarea>
            </section>
        </div>

        <footer>
            <p>Made by Maxim Belousov</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
